<html>
  <head>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Smythe&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Jimmy’s Diner</h1>
        <p class="header__description">The best burgers and pizzas in town.</p>
      </div>
    </header>
    <main>
      <section>
        <div class="container" id="menu-container"></div>
      </section>
      <section class="order__section hidden">
        <div class="container">
          <h2 class="order__section-title">Your order</h2>
          <div class="order__list"></div>
          <div class="total__price-wrapper">
            <p class="total__price-title">Total price:</p>
            <p class="total__price"></p>
          </div>
          <button class="order__btn">Complete order</button>
        </div>
      </section>
    </main>
    <script src="index.js" type="module"></script>
  </body>
</html>
